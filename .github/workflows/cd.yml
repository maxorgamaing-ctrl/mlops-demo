name: CD - Register and Deploy

on:
  push:
    branches: [main]

permissions:
  contents: read
  packages: write

jobs:
  deploy:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: churn-mlops

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run full test suite before deploy
        run: python -m pytest tests/ -v

      - name: Promote model to Production in MLflow registry
        env:
          MLFLOW_TRACKING_URI: sqlite:///mlflow.db
        run: python scripts/promote_model.py --stage Production

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        run: |
          IMAGE=ghcr.io/${{ github.repository_owner }}/churn-api
          docker build -t $IMAGE:${{ github.sha }} .
          docker build -t $IMAGE:latest .
          docker push $IMAGE:${{ github.sha }}
          docker push $IMAGE:latest

      - name: Deploy to Kubernetes
        if: env.KUBECONFIG_DATA != ''
        env:
          KUBECONFIG_DATA: ${{ secrets.KUBECONFIG_DATA }}
        run: |
          echo "$KUBECONFIG_DATA" | base64 -d > /tmp/kubeconfig
          export KUBECONFIG=/tmp/kubeconfig
          kubectl set image deployment/churn-api \
            churn-api=ghcr.io/${{ github.repository_owner }}/churn-api:${{ github.sha }}
          kubectl rollout status deployment/churn-api --timeout=120s
